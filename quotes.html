    text-align: center;
    padding: 80px 20px 60px;
    border-bottom: 1px solid var(--border);

  }

  header::after {
    content: '';
    position: absolute;

    background: linear-gradient(90deg, transparent, var(--gold), transparent);

    gap: 0;
    padding: 12px 0;
    animation: fadeDown 0.8s 0.6s ease both;
    opacity: 0;

    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'EB Garamond', serif;
    font-size: 0.95rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 8px 32px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;

  .lang-btn:last-child  { border-radius: 0 2px 2px 0; border-left: none; }

    background: var(--gold);
    color: var(--bg);
    border-color: var(--gold);
    font-weight: 600;

    letter-spacing: 4px;

    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 24px;

    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 36px 32px 28px;
    position: relative;
    overflow: hidden;
    cursor: default;
    transition: transform 0.35s cubic-bezier(.2,.8,.2,1), border-color 0.35s, box-shadow 0.35s;
    animation: cardReveal 0.6s ease both;
  }

    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0;
    transition: opacity 0.35s;

    transform: translateY(-4px);
    border-color: var(--border-strong);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(201,168,76,0.04);

    font-size: 7rem;
    line-height: 1;

    color: var(--gold-dim);

    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 10px;

    background: linear-gradient(135deg, #1a1712, #12100d);

    .q-card.featured .q-text { font-size: 1.2rem; }

    text-align: center;
    padding: 40px 20px;
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 0.8rem;

    from { opacity: 0; transform: translateY(-16px); }

let currentLang = 'fa';

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-fa').classList.toggle('active', lang === 'fa');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.documentElement.setAttribute('dir', lang === 'fa' ? 'rtl' : 'ltr');
  renderQuotes();
}

function renderQuotes() {
  const grid = document.getElementById('quotes-grid');
  grid.innerHTML = '';

  const total = quotes.length;
  document.getElementById('count-bar').textContent =
    currentLang === 'fa'
      ? `${total} نقل قول`
      : `${total} Quotations`;

  quotes.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'q-card' + (q.featured ? ' featured' : '');
    card.style.animationDelay = `${Math.min(i * 0.05, 1.2)}s`;

    const text   = currentLang === 'fa' ? q.fa : q.en;
    const author = currentLang === 'fa' ? q.author_fa : q.author_en;
    const textDir = currentLang === 'fa' ? 'rtl' : 'ltr';

    card.innerHTML = `
      <div class="q-mark">"</div>
      <div class="q-num">${String(i + 1).padStart(2, '0')}</div>
      <p class="q-text ${textDir}">${text}</p>
      <div class="q-author">
        <div class="q-author-dash"></div>
        <span class="q-author-name ${textDir}">${author}</span>
      </div>
      <span class="q-tag">${q.tag}</span>
    `;
    grid.appendChild(card);
  });
}

// Initial render
renderQuotes();
