<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wisdom — نقل قول های خردمندانه</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Amiri:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0b08;
    --surface: #141209;
    --card: #1a1712;
    --gold: #c9a84c;
    --gold-light: #e8c87a;
    --gold-dim: #7a6330;
    --text: #e8e0d0;
    --text-dim: #a09080;
    --accent: #8b3a2a;
    --border: rgba(201,168,76,0.18);
    --border-strong: rgba(201,168,76,0.4);
    --cote-blue: #4a9eda;
    --cote-blue-bg: rgba(74,158,218,0.08);
    --cote-blue-border: rgba(74,158,218,0.25);
    --green: #5cb87a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.6;
  }

  /* ── HEADER ── */
  header {
    position: relative; text-align: center;
    padding: 80px 20px 60px;
    border-bottom: 1px solid var(--border); overflow: hidden;
  }
  header::after {
    content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 120px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .header-ornament {
    display: block; font-size: 28px; color: var(--gold);
    letter-spacing: 12px; margin-bottom: 28px; opacity: 0.7;
    animation: fadeDown 1s ease both;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 4rem); font-weight: 400;
    color: var(--gold-light); letter-spacing: 3px; line-height: 1.1;
    animation: fadeDown 1s 0.2s ease both; opacity: 0;
  }
  .header-sub {
    margin-top: 16px; font-family: 'Amiri', serif; font-size: 1.5rem;
    color: var(--text-dim); font-style: italic;
    animation: fadeDown 1s 0.4s ease both; opacity: 0;
  }

  /* ── LANG BAR ── */
  .lang-bar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,11,8,0.92); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    gap: 0; padding: 12px 0;
    animation: fadeDown 0.8s 0.6s ease both; opacity: 0;
  }
  .lang-btn {
    background: none; border: 1px solid var(--border); color: var(--text-dim);
    font-family: 'EB Garamond', serif; font-size: 0.95rem;
    letter-spacing: 3px; text-transform: uppercase;
    padding: 8px 32px; cursor: pointer; transition: all 0.3s ease;
  }
  .lang-btn:first-child { border-radius: 2px 0 0 2px; border-right: none; }
  .lang-btn:last-child  { border-radius: 0 2px 2px 0; border-left: none; }
  .lang-btn.active { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: 600; }
  .lang-btn:not(.active):hover { color: var(--gold); border-color: var(--gold-dim); }

  /* ── COUNT BAR ── */
  .count-bar {
    text-align: center; padding: 32px 20px 8px;
    color: var(--gold-dim); font-size: 0.8rem; letter-spacing: 4px; text-transform: uppercase;
  }

  /* ── GRID ── */
  .quotes-grid {
    max-width: 1280px; margin: 0 auto;
    padding: 40px 24px 100px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px;
  }

  /* ── CARD ── */
  .q-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 2px;
    padding: 36px 32px 28px; position: relative; overflow: hidden; cursor: default;
    transition: transform 0.35s cubic-bezier(.2,.8,.2,1), border-color 0.35s, box-shadow 0.35s;
    animation: cardReveal 0.6s ease both;
  }
  .q-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0; transition: opacity 0.35s;
  }
  .q-card:hover { transform: translateY(-4px); border-color: var(--border-strong); box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(201,168,76,0.04); }
  .q-card:hover::before { opacity: 1; }

  .q-mark {
    position: absolute; top: 16px; right: 22px;
    font-family: 'Playfair Display', serif; font-size: 7rem; line-height: 1;
    color: var(--gold); opacity: 0.06; pointer-events: none; user-select: none;
  }
  .q-num {
    position: absolute; top: 20px; left: 20px;
    font-size: 0.65rem; letter-spacing: 2px; color: var(--gold-dim); font-family: 'EB Garamond', serif;
  }

  /* copy button — floats top-right of card, shown on hover */
  .q-copy-btn {
    position: absolute; top: 14px; right: 14px;
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); border-radius: 2px;
    padding: 4px 10px; font-size: 0.58rem; letter-spacing: 1.5px;
    text-transform: uppercase; cursor: pointer;
    font-family: 'EB Garamond', serif;
    display: flex; align-items: center; gap: 5px;
    opacity: 0; transition: opacity 0.25s, border-color 0.25s, color 0.25s, background 0.25s;
    z-index: 2;
  }
  .q-card:hover .q-copy-btn { opacity: 1; }
  .q-copy-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
  .q-copy-btn.copied {
    border-color: var(--green); color: var(--green);
    background: rgba(92,184,122,0.08);
  }
  .q-copy-btn svg { width: 9px; height: 9px; flex-shrink: 0; }

  .q-text {
    margin-top: 12px; font-size: 1.18rem; line-height: 1.8; color: var(--text); font-style: italic;
  }
  .q-text.rtl { font-family: 'Amiri', serif; font-size: 1.22rem; direction: rtl; text-align: right; }
  .q-text.ltr { font-family: 'EB Garamond', serif; direction: ltr; text-align: left; }

  .q-author {
    margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .q-author-dash { width: 20px; height: 1px; background: var(--gold); flex-shrink: 0; }
  .q-author-name { font-size: 0.82rem; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; font-style: normal; font-family: 'EB Garamond', serif; }
  .q-author-name.rtl { font-family: 'Amiri', serif; font-size: 0.95rem; letter-spacing: 1px; text-transform: none; direction: rtl; }

  /* bottom row: tag + cote badge */
  .q-bottom {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 8px; margin-top: 14px;
  }
  .q-tag {
    display: inline-block; font-size: 0.65rem; letter-spacing: 2px;
    text-transform: uppercase; padding: 3px 10px;
    border: 1px solid var(--border); color: var(--text-dim); border-radius: 1px;
  }

  /* ── COTE SOURCE BADGE (hidden until toggle) ── */
  .q-cote-badge {
    display: none; /* shown via JS when coteOn */
    align-items: center; gap: 5px;
    font-size: 0.6rem; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--cote-blue); border: 1px solid var(--cote-blue-border);
    background: var(--cote-blue-bg); border-radius: 1px;
    padding: 3px 9px; cursor: pointer; white-space: nowrap;
    transition: background 0.2s, border-color 0.2s;
    position: relative;
  }
  .q-cote-badge.visible { display: flex; }
  .q-cote-badge:hover { background: rgba(74,158,218,0.14); border-color: rgba(74,158,218,0.5); }
  .q-cote-badge .cote-dot { width: 5px; height: 5px; background: var(--cote-blue); border-radius: 50%; flex-shrink: 0; }

  /* cote tooltip */
  .q-cote-tooltip {
    display: none;
    position: absolute; bottom: calc(100% + 8px); right: 0;
    background: #1c1916; border: 1px solid var(--cote-blue-border);
    color: var(--cote-blue); border-radius: 2px;
    padding: 10px 13px; font-size: 0.75rem; line-height: 1.5;
    font-style: italic; font-family: 'EB Garamond', serif;
    white-space: nowrap; z-index: 200;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    letter-spacing: 0; text-transform: none;
    animation: fadeDown 0.2s ease both;
    min-width: 200px; max-width: 320px; white-space: normal;
  }
  .q-cote-tooltip::after {
    content: ''; position: absolute; top: 100%; right: 14px;
    border: 5px solid transparent;
    border-top-color: var(--cote-blue-border);
  }
  .q-cote-badge:hover .q-cote-tooltip { display: block; }
  .q-cote-tooltip-label {
    font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase;
    opacity: 0.55; margin-bottom: 5px; font-style: normal;
  }

  /* ── FEATURED ── */
  .q-card.featured { grid-column: span 2; border-color: var(--gold-dim); background: linear-gradient(135deg, #1a1712, #12100d); }
  .q-card.featured .q-text { font-size: 1.45rem; }
  .q-card.featured .q-text.rtl { font-size: 1.5rem; }
  @media (max-width: 760px) {
    .q-card.featured { grid-column: span 1; }
    .q-card.featured .q-text { font-size: 1.2rem; }
  }

  /* ── FLOATING COTE TOGGLE ── */
  .cote-fab {
    position: fixed; bottom: 32px; right: 28px; z-index: 500;
    display: flex; align-items: center; gap: 9px;
    background: #181512; border: 1px solid var(--border);
    border-radius: 50px; padding: 10px 18px;
    cursor: pointer; user-select: none;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
    animation: fabIn 0.8s 1.2s ease both; opacity: 0;
  }
  .cote-fab:hover { box-shadow: 0 6px 32px rgba(0,0,0,0.7); }
  .cote-fab.active {
    border-color: var(--cote-blue);
    background: rgba(74,158,218,0.1);
    box-shadow: 0 4px 28px rgba(74,158,218,0.15);
  }
  .cote-fab-icon { font-size: 1.1rem; line-height: 1; }
  .cote-fab-label {
    font-family: 'EB Garamond', serif; font-size: 0.72rem; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-dim); transition: color 0.3s;
    white-space: nowrap;
  }
  .cote-fab.active .cote-fab-label { color: var(--cote-blue); }
  /* pill checkbox */
  .cote-fab-check {
    width: 14px; height: 14px; border: 1.5px solid var(--gold-dim); border-radius: 2px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: all 0.25s;
  }
  .cote-fab.active .cote-fab-check { background: var(--cote-blue); border-color: var(--cote-blue); }
  .cote-fab-check svg { display: none; width: 8px; height: 8px; }
  .cote-fab.active .cote-fab-check svg { display: block; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: #1c1a16; color: var(--green);
    border: 1px solid rgba(92,184,122,0.35);
    padding: 8px 20px; border-radius: 2px;
    font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s, transform 0.25s; z-index: 9999; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── FOOTER ── */
  footer { text-align: center; padding: 40px 20px; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 0.8rem; letter-spacing: 3px; }
  .ornament-divider { text-align: center; padding: 8px 0 0; color: var(--gold-dim); font-size: 1rem; letter-spacing: 8px; opacity: 0.5; }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes cardReveal { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fabIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .q-card:nth-child(1)  { animation-delay: 0.05s; } .q-card:nth-child(2)  { animation-delay: 0.10s; }
  .q-card:nth-child(3)  { animation-delay: 0.15s; } .q-card:nth-child(4)  { animation-delay: 0.20s; }
  .q-card:nth-child(5)  { animation-delay: 0.25s; } .q-card:nth-child(6)  { animation-delay: 0.30s; }
  .q-card:nth-child(7)  { animation-delay: 0.35s; } .q-card:nth-child(8)  { animation-delay: 0.40s; }
  .q-card:nth-child(9)  { animation-delay: 0.45s; } .q-card:nth-child(10) { animation-delay: 0.50s; }
  .q-card:nth-child(11) { animation-delay: 0.55s; } .q-card:nth-child(12) { animation-delay: 0.60s; }
  .q-card:nth-child(13) { animation-delay: 0.65s; } .q-card:nth-child(14) { animation-delay: 0.70s; }
  .q-card:nth-child(15) { animation-delay: 0.75s; } .q-card:nth-child(16) { animation-delay: 0.80s; }
  .q-card:nth-child(17) { animation-delay: 0.85s; } .q-card:nth-child(18) { animation-delay: 0.90s; }
  .q-card:nth-child(19) { animation-delay: 0.95s; } .q-card:nth-child(20) { animation-delay: 1.00s; }
  .q-card:nth-child(n+21) { animation-delay: 1.05s; }
</style>
</head>
<body>

<header>
  <span class="header-ornament">✦ ✦ ✦</span>
  <h1>WISDOM</h1>
  <p class="header-sub">نقل قول های خردمندانه · Timeless Quotations</p>
</header>

<nav class="lang-bar">
  <button class="lang-btn active" id="btn-fa" onclick="setLang('fa')">فارسی</button>
  <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>

<p class="count-bar" id="count-bar"></p>
<main class="quotes-grid" id="quotes-grid"></main>

<footer>
  <div class="ornament-divider">— ✦ —</div>
  <p style="margin-top:20px">Snow Breaker Collection · 2026</p>
</footer>

<!-- Floating COTE toggle button -->
<div class="cote-fab" id="coteFab" onclick="toggleCote()">
  <span class="cote-fab-icon">🎌</span>
  <span class="cote-fab-label" id="fabLabel">Classroom of the Elite</span>
  <div class="cote-fab-check">

  </div>
</div>

<div id="toast"></div>

<script>

// ─── QUOTE DATA ──────────────────────────────────────────────────────────────
const quotes = [

  { fa: "تمام انسان‌ها درون خود، خطرناک‌ترین خائن را دارند.", en: "Every man carries within himself the most dangerous traitor of all.", author_fa: "سورن کیرکگارد", author_en: "Søren Kierkegaard", tag: "Psychology", featured: false },

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentLang = 'fa';
let coteOn = false;

// ─── ICONS ───────────────────────────────────────────────────────────────────
const ICO_COPY = `<svg viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="3.5" y="3.5" width="8" height="8.5" rx="1" stroke="currentColor" stroke-width="1.2"/>
  <path d="M1.5 9.5V1.5h8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
</svg>`;
const ICO_CHECK = `<svg viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
  <polyline points="2,6.5 5,9.5 11,3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

// ─── LANG ─────────────────────────────────────────────────────────────────────
function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-fa').classList.toggle('active', lang === 'fa');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.documentElement.setAttribute('dir', lang === 'fa' ? 'rtl' : 'ltr');
  renderQuotes();
}

// ─── COTE TOGGLE ─────────────────────────────────────────────────────────────
function toggleCote() {
  coteOn = !coteOn;
  document.getElementById('coteFab').classList.toggle('active', coteOn);
  document.querySelectorAll('.q-cote-badge').forEach(b => b.classList.toggle('visible', coteOn));
  showToast(coteOn
    ? (currentLang === 'fa' ? '🎌 منبع انیمه نمایش داده شد' : '🎌 Anime sources revealed')
    : (currentLang === 'fa' ? 'منبع انیمه پنهان شد' : 'Anime sources hidden')
  );
}

// ─── COPY ─────────────────────────────────────────────────────────────────────
function doCopy(text, btn) {
  const origHTML = btn.innerHTML;
  const label = currentLang === 'fa' ? 'کپی شد' : 'Copied';
  navigator.clipboard.writeText(text).then(() => {
    btn.innerHTML = ICO_CHECK + label;
    btn.classList.add('copied');
    showToast(currentLang === 'fa' ? '✓ متن کپی شد' : '✓ Copied to clipboard');
    setTimeout(() => { btn.innerHTML = origHTML; btn.classList.remove('copied'); }, 1800);
  }).catch(() => {
    // fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    btn.innerHTML = ICO_CHECK + label; btn.classList.add('copied');
    showToast('✓ Copied');
    setTimeout(() => { btn.innerHTML = origHTML; btn.classList.remove('copied'); }, 1800);
  });
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderQuotes() {
  const grid = document.getElementById('quotes-grid');
  grid.innerHTML = '';

  document.getElementById('count-bar').textContent =
    currentLang === 'fa' ? `${quotes.length} نقل قول` : `${quotes.length} Quotations`;

  quotes.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'q-card' + (q.featured ? ' featured' : '');
    card.style.animationDelay = `${Math.min(i * 0.05, 1.2)}s`;

    const text    = currentLang === 'fa' ? q.fa : q.en;
    const author  = currentLang === 'fa' ? q.author_fa : q.author_en;
    const textDir = currentLang === 'fa' ? 'rtl' : 'ltr';

    // copy button label = just the current language text
    const copyLabel = currentLang === 'fa' ? 'کپی' : 'Copy';

    // COTE badge
    const src = COTE_SOURCES[i] || null;
    let coteBadgeHTML = '';
    if (src) {
      const seasonLabel = currentLang === 'fa'
        ? `فصل ${src.season} · قسمت ${src.ep}`
        : `S${src.season} · Ep.${src.ep}`;
      const tooltipLabel = currentLang === 'fa' ? 'منبع در انیمه' : 'Source in anime';
      coteBadgeHTML = `
        <div class="q-cote-badge ${coteOn ? 'visible' : ''}">
          <span class="cote-dot"></span>
          ${seasonLabel}
          <div class="q-cote-tooltip">
            <div class="q-cote-tooltip-label">${tooltipLabel}</div>
            ${src.detail}
          </div>
        </div>`;
    }

    card.innerHTML = `
      <button class="q-copy-btn" title="${copyLabel}">${ICO_COPY}${copyLabel}</button>
      <div class="q-mark">"</div>
      <div class="q-num">${String(i + 1).padStart(2, '0')}</div>
      <p class="q-text ${textDir}">${text}</p>
      <div class="q-author">
        <div class="q-author-dash"></div>
        <span class="q-author-name ${textDir}">${author}</span>
      </div>
      <div class="q-bottom">
        <span class="q-tag">${q.tag}</span>
        ${coteBadgeHTML}
      </div>
    `;

    // wire up copy button to copy current language text
    card.querySelector('.q-copy-btn').addEventListener('click', e => {
      e.stopPropagation();
      doCopy(text, e.currentTarget);
    });

    grid.appendChild(card);
  });
}

renderQuotes();
</script>
