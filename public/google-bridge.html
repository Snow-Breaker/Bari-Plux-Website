<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Google Sign-In | Bari Plux</title>
    <style>
        :root { color-scheme: dark; }
        body {
            margin: 0; min-height: 100vh; display: grid; place-items: center;
            font-family: Segoe UI, system-ui, sans-serif;
            background: #0f1115; color: #e8eef8;
        }
        .card {
            width: min(420px, 92vw); padding: 28px 24px; border-radius: 16px;
            background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
            text-align: center;
        }
        .spin {
            width: 36px; height: 36px; margin: 0 auto 14px;
            border: 3px solid rgba(255,255,255,.2); border-top-color: #00B4FF;
            border-radius: 50%; animation: r 0.8s linear infinite;
        }
        @keyframes r { to { transform: rotate(360deg); } }
        a.btn, button.btn {
            display: inline-block; margin-top: 14px; padding: 12px 22px;
            border-radius: 12px; background: #00B4FF; color: #041018;
            font-weight: 700; text-decoration: none; border: 0; cursor: pointer;
        }
        a.secondary { color: #9fb3c8; display: block; margin-top: 12px; font-size: .9rem; }
        .err { color: #ff8e8e; }
        .muted { color: #9fb3c8; font-size: .92rem; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="card" id="card">
        <div class="spin" id="spin"></div>
        <div id="status">Connecting to Google…</div>
        <div class="muted" id="hint" style="margin-top:10px;">Full-page sign-in (avoids Brave popup 400).</div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBH_t3Uue7fbb-DahwjSJGjG2-quCqiLEs",
            authDomain: "baripluxwebsite.firebaseapp.com",
            databaseURL: "https://baripluxwebsite-default-rtdb.firebaseio.com",
            projectId: "baripluxwebsite",
            storageBucket: "baripluxwebsite.firebasestorage.app",
            messagingSenderId: "280043766563",
            appId: "1:280043766563:web:409e6b78c1c24b568fc296"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        const params = new URLSearchParams(location.search);
        const isDesktop = params.get('desktop') === '1'
            || sessionStorage.getItem('desktop_login_flow') === '1';
        if (params.get('desktop') === '1') {
            sessionStorage.setItem('desktop_login_flow', '1');
        }
        const returnUrl = params.get('return')
            || 'https://bariplux.com/login1.html';

        function setStatus(html, spinning) {
            document.getElementById('status').innerHTML = html;
            document.getElementById('spin').style.display = spinning ? 'block' : 'none';
        }

        async function encryptToken(plaintext, sessionId) {
            if (!plaintext) return null;
            try {
                const hex = String(sessionId).replace(/-/g, '');
                const keyBytes = new Uint8Array(16);
                for (let i = 0; i < 16; i++) keyBytes[i] = parseInt(hex.substr(i * 2, 2), 16);
                const key = await crypto.subtle.importKey('raw', keyBytes, { name: 'AES-CBC' }, false, ['encrypt']);
                const iv = crypto.getRandomValues(new Uint8Array(16));
                const encoded = new TextEncoder().encode(plaintext);
                const cipher = await crypto.subtle.encrypt({ name: 'AES-CBC', iv }, key, encoded);
                const out = new Uint8Array(iv.length + cipher.byteLength);
                out.set(iv, 0);
                out.set(new Uint8Array(cipher), iv.length);
                let s = '';
                out.forEach(b => { s += String.fromCharCode(b); });
                return btoa(s);
            } catch (e) {
                console.error(e);
                return null;
            }
        }

        async function createPendingToken(user) {
            const serverTs = await database.ref('/.info/serverTimeOffset')
                .once('value').then(snap => Date.now() + (snap.val() || 0));
            const sessionId = crypto.randomUUID();
            const claimSecret = crypto.randomUUID();
            const csHashBytes = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(claimSecret));
            const csHash = Array.from(new Uint8Array(csHashBytes)).map(b => b.toString(16).padStart(2, '0')).join('');

            let firebaseIdToken = null, refreshToken = null;
            try {
                const fbUser = auth.currentUser;
                if (fbUser) {
                    firebaseIdToken = await fbUser.getIdToken(true);
                    refreshToken = fbUser.refreshToken || null;
                }
            } catch (e) { console.warn(e); }

            let clientIp = null;
            try {
                const ipData = await fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(3000) }).then(r => r.json());
                clientIp = ipData.ip || null;
            } catch (e) {}

            const encId = await encryptToken(firebaseIdToken, sessionId);
            const encRefresh = await encryptToken(refreshToken, sessionId);

            await database.ref('pending_tokens/' + user.uid + '/' + sessionId).set({
                uid: user.uid,
                email: user.email || '',
                name: user.displayName || (user.email ? user.email.split('@')[0] : 'User'),
                photoURL: user.photoURL || null,
                created_at: firebase.database.ServerValue.TIMESTAMP,
                expires_at: serverTs + 300000,
                claimed: false,
                allowed_ip: clientIp,
                cs_hash: csHash,
                firebase_id_token_enc: encId,
                refresh_token_enc: encRefresh,
                has_token: !!(encId || firebaseIdToken)
            });

            return { claimToken: user.uid + ':' + sessionId, claimSecret };
        }

        function showDesktopSuccess(claimToken, claimSecret) {
            const base64Claim = btoa(claimToken);
            const secretParam = claimSecret ? ('&secret=' + encodeURIComponent(claimSecret)) : '';
            const href = 'baripluxtool://login?token=' + encodeURIComponent(base64Claim) + secretParam;
            const hrefAlt = 'bptv2://login?token=' + encodeURIComponent(base64Claim) + secretParam;
            setStatus(
                '<div style="font-size:1.15rem;font-weight:700;margin-bottom:8px;">Signed in with Google</div>' +
                '<div class="muted">Click below to open Bari Plux Tool.</div>' +
                '<a class="btn" href="' + href + '">Open Bari Plux App</a>' +
                '<a class="secondary" href="' + hrefAlt + '">Alternate app link</a>' +
                '<a class="secondary" href="https://bariplux.com/login1.html?desktop=1">Back to login</a>',
                false
            );
            // Auto-try protocol once (may be blocked without gesture in some browsers)
            try { window.location.href = href; } catch (e) {}
        }

        async function finish(user) {
            sessionStorage.removeItem('google_bridge_pending');
            setStatus('Finishing sign-in…', true);
            if (isDesktop) {
                try {
                    const pending = await createPendingToken(user);
                    showDesktopSuccess(pending.claimToken, pending.claimSecret);
                } catch (e) {
                    console.error(e);
                    setStatus('<span class="err">Signed in, but could not create app token.</span><br><a class="secondary" href="https://bariplux.com/login1.html?desktop=1">Back</a>', false);
                }
                return;
            }
            // Website: send back with a short-lived Firebase ID token handoff via custom token is hard;
            // keep session on this host and send user home.
            setStatus(
                '<div style="font-weight:700;">Signed in as ' + (user.email || user.displayName || 'user') + '</div>' +
                '<a class="btn" href="https://bariplux.com/">Continue to Bari Plux</a>',
                false
            );
        }

        function showFail(msg) {
            sessionStorage.removeItem('google_bridge_pending');
            setStatus(
                '<span class="err">' + (msg || 'Google sign-in failed') + '</span>' +
                '<div class="muted" style="margin-top:10px;">If you use Brave, clear cookies for google.com or try Discord.</div>' +
                '<a class="btn" href="https://bariplux.com/login1.html?desktop=1">Use Discord instead</a>' +
                '<a class="secondary" href="' + location.pathname + location.search + '">Retry Google</a>',
                false
            );
        }

        (async function main() {
            try {
                const result = await auth.getRedirectResult();
                if (result && result.user) {
                    await finish(result.user);
                    return;
                }
            } catch (e) {
                console.error('[getRedirectResult]', e);
                showFail(e.message || 'Google redirect failed');
                return;
            }

            // Already signed in from a previous attempt on this host
            if (auth.currentUser && sessionStorage.getItem('google_bridge_pending') === '1') {
                await finish(auth.currentUser);
                return;
            }

            if (sessionStorage.getItem('google_bridge_pending') === '1') {
                // Came back without a user — failed or cancelled
                showFail('Google sign-in was cancelled or blocked.');
                return;
            }

            // Start full-page Google redirect (same origin as authDomain).
            // prompt=login avoids Brave ServiceLogin?rart=400 on broken Google cookies.
            sessionStorage.setItem('google_bridge_pending', '1');
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'login' });
            provider.addScope('email');
            provider.addScope('profile');
            try {
                await auth.signInWithRedirect(provider);
            } catch (e) {
                console.error(e);
                showFail(e.message || 'Could not start Google sign-in');
            }
        })();
    </script>
</body>
</html>
