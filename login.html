<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>Login | Bari Plux</title>
    <meta name="description" content="Login to your Bari Plux account">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Montserrat:wght@700;800&family=Oxanium:wght@400;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/all-styles.css">
    
    <link rel="icon" type="image/x-icon" href="https://i.postimg.cc/65cjsvfQ/imglogo.png">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <style>
        :root {
            --bg-1: #0f1115;
            --bg-2: #15171b;
            --glass-bg: rgba(255,255,255,0.06);
            --glass-strong: rgba(255,255,255,0.08);
            --glass-accent: rgba(108,99,255,0.12);
            --accent: #6C63FF;
            --accent-2: #00BFA6;
            --text: #e8eef8;
            --muted: rgba(232,238,248,0.65);
            --radius-lg: 20px;
            --radius: 12px;
            --transition: 300ms cubic-bezier(.2,.9,.2,1);
            --glass-border: rgba(255,255,255,0.08);
            --glass-inner-shadow: rgba(0,0,0,0.35);
            --success: #4CAF50;
            --warning: #FF9800;
            --danger: #F44336;
            --shadow: 0 8px 30px rgba(0,0,0,0.35);
            --shadow-hover: 0 24px 50px rgba(0,0,0,0.45);
        }

        [data-theme="light"] {
            --bg-1: #f6f8fb;
            --bg-2: #eef2f7;
            --glass-bg: rgba(255,255,255,0.85);
            --glass-strong: rgba(255,255,255,0.95);
            --glass-accent: rgba(108,99,255,08);
            --accent: #5748E8;
            --accent-2: #07bfa0;
            --text: #111827;
            --muted: rgba(17,24,39,0.6);
            --glass-border: rgba(0,0,0,0.04);
            --glass-inner-shadow: rgba(255,255,255,0.6);
        }

        *{box-sizing:border-box; margin:0; padding:0;}
        html,body{height:100%}
        body{
            margin:0;
            font-family:'Poppins',sans-serif;
            background:
                radial-gradient(800px 400px at 10% 20%, rgba(108,99,255,0.08), transparent 10%),
                radial-gradient(600px 300px at 90% 80%, rgba(0,191,166,0.06), transparent 12%),
                linear-gradient(180deg,var(--bg-1),var(--bg-2));
            color:var(--text);
            -webkit-font-smoothing:antialiased;
            -moz-osx-font-smoothing:grayscale;
            background-attachment: fixed;
            position: relative;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            pointer-events: none;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -2;
            overflow: hidden;
        }

        .floating-circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent), transparent 70%);
            opacity: 0.05;
            animation: float 20s infinite ease-in-out;
        }

        .circle-1 {
            width: 300px;
            height: 300px;
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }

        .circle-2 {
            width: 200px;
            height: 200px;
            top: 60%;
            right: 10%;
            animation-delay: 5s;
            background: radial-gradient(circle, var(--accent-2), transparent 70%);
        }

        .circle-3 {
            width: 250px;
            height: 250px;
            bottom: 20%;
            left: 30%;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        /* Header Styles */
        .header {
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px;
            margin: 15px auto;
            width: calc(100% - 40px);
            max-width: 1400px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .header .left {
            display: flex;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text);
        }

        .logo-img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.1rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav {
            display: flex;
            align-items: center;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 5px;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            padding: 8px 14px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text);
            background: var(--glass-bg);
        }

        @media (max-width: 1000px) {
            .nav-links {
                display: none;
            }
        }

        /* Theme Toggle */
        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(108, 99, 255, 0.3);
        }

        .theme-toggle .moon-icon {
            display: block;
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        .theme-toggle .sun-icon {
            display: none;
            color: #FFA500;
            text-shadow: 0 0 10px rgba(255, 165, 0, 0.8);
        }

        [data-theme="light"] .theme-toggle .moon-icon {
            display: none;
        }

        [data-theme="light"] .theme-toggle .sun-icon {
            display: block;
        }

        /* Main Container */
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 140px 20px 60px;
            position: relative;
            z-index: 1;
        }

        /* Login Card */
        .login-container {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.03));
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 40px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .login-header {
            margin-bottom: 30px;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            object-fit: contain;
            border: none !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            background: transparent !important;
        }

        .login-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .login-subtitle {
            color: var(--muted);
            font-size: 0.95rem;
        }

        /* Google Button */
        .btn-google {
            width: 100%;
            padding: 14px 20px;
            background: white;
            color: #333;
            border: none;
            border-radius: var(--radius);
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-google:hover {
            background: #f5f5f5;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .btn-google img {
            width: 20px;
            height: 20px;
        }

        .btn-google.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .btn-google.loading .btn-text { display: none; }
        .btn-google .loading-spinner { display: none; }
        .btn-google.loading .loading-spinner {
            display: block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0,0,0,0.2);
            border-top-color: #333;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .login-divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: var(--muted);
            font-size: 0.85rem;
        }

        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        .login-divider span {
            padding: 0 15px;
        }

        /* Feature Pills */
        .feature-pills {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        .feature-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--muted);
        }

        .feature-pill i {
            color: var(--accent);
        }

        /* User Info (logged in) */
        .user-info {
            text-align: center;
            padding: 20px 0;
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: white;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .user-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .user-email {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        /* App Token Section */
        .app-token-section {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }

        .app-token-section h4 {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .app-token-section h4 i {
            color: var(--accent);
        }

        .token-display {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .token-input {
            flex: 1;
            padding: 10px 12px;
            background: var(--bg-1);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            color: var(--accent);
            font-family: monospace;
            font-size: 0.8rem;
            word-break: break-all;
        }

        .copy-token-btn {
            padding: 10px 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
        }

        .copy-token-btn:hover {
            background: #7a72ff;
        }

        .copied-msg {
            display: none;
            padding: 8px 12px;
            background: rgba(76, 175, 80, 0.15);
            border-radius: var(--radius);
            color: var(--success);
            font-size: 0.8rem;
            text-align: center;
        }

        .copied-msg.show {
            display: block;
        }

        .open-app-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .open-app-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108, 99, 255, 0.4);
        }

        .btn-logout {
            width: 100%;
            padding: 14px;
            background: rgba(244, 67, 54, 0.15);
            color: #F44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
            border-radius: var(--radius);
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-logout:hover {
            background: rgba(244, 67, 54, 0.25);
            transform: translateY(-2px);
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 15px 25px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10000;
            animation: slideIn 0.3s ease;
            font-size: 0.9rem;
        }

        .notification.success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.4);
            color: #4CAF50;
        }

        .notification.error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.4);
            color: #F44336;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 24px;
            color: var(--muted);
            font-size: 0.85rem;
            position: relative;
            z-index: 1;
        }

        .footer a {
            color: var(--muted);
            text-decoration: none;
            margin: 0 12px;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: var(--text);
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .feature-pills {
                flex-wrap: wrap;
            }

            .header {
                padding: 10px 16px;
            }

            .token-display {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <!-- Scroll Progress Bar -->
    <div class="scroll-progress" id="scrollProgress" style="position:fixed;top:0;left:0;width:0%;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-2));z-index:10001;transition:width 0.1s ease-out;"></div>

    <!-- Particles Background -->
    <div id="particles-js"></div>

    <!-- Background Animation -->
    <div class="bg-animation">
        <div class="floating-circle circle-1"></div>
        <div class="floating-circle circle-2"></div>
        <div class="floating-circle circle-3"></div>
    </div>

    <!-- Header -->
    <header class="header glass">
        <div class="left">
            <a href="index.html" class="logo">
                <img class="logo-img" src="https://yt3.googleusercontent.com/RPW5Z_kcoEu0ES_VpL4-7ZqI4eI1OQfuVL-DbuCYWmRhXono9hA5NOCSGGMDLzJqNcHUlhOg=s160-c-k-c0x00ffffff-no-rj" alt="Bari Plux">
                <span class="logo-text">Bari Plux</span>
            </a>
        </div>
        
        <nav class="nav">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#downloads">Downloads</a></li>
                <li><a href="index.html#videos">Videos</a></li>
                <li><a href="index.html#pubg">Content</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
        
        <div style="display:flex;align-items:center;gap:12px">
            <div id="theme-toggle" class="theme-toggle" title="Toggle Theme">
                <span class="moon-icon">🌙</span>
                <span class="sun-icon">☀️</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <div class="login-container glass">
            <!-- Login View -->
            <div id="loginFormView">
                <div class="login-header">
                    <img class="login-logo" src="https://i.postimg.cc/65cjsvfQ/imglogo.png" alt="Bari Plux">
                    <h1 class="login-title">Welcome Back</h1>
                    <p class="login-subtitle">Login to your Bari Plux account</p>
                </div>

                <button id="btnGoogleLogin" class="btn-google">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                    <span class="btn-text">Continue with Google</span>
                    <div class="loading-spinner"></div>
                </button>

                <div class="login-divider">
                    <span>Quick & secure</span>
                </div>

                <div class="feature-pills">
                    <span class="feature-pill"><i class="fas fa-shield-alt"></i> Secure</span>
                    <span class="feature-pill"><i class="fas fa-bolt"></i> Instant</span>
                    <span class="feature-pill"><i class="fas fa-sync"></i> Sync</span>
                </div>
            </div>

            <!-- Logged In View -->
            <div id="loggedInView" style="display:none;">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar"></div>
                    <h1 class="user-name" id="userName">User</h1>
                    <p class="user-email" id="userEmail">email@example.com</p>
                </div>
                
                <!-- User Info -->
                <div class="user-id" style="background: var(--glass-bg); padding: 12px; border-radius: var(--radius); margin: 20px 0; font-size: 0.85rem;">
                    <strong>User ID:</strong> <span id="userId">---</span>
                </div>

                <!-- Bari Plux Tool Token Section -->
                <div class="app-token-section">
                    <h4><i class="fas fa-mobile-alt"></i> Use in Bari Plux App</h4>
                    <div class="token-display">
                        <input type="text" class="token-input" id="loginToken" readonly placeholder="Login token will appear here">
                        <button class="copy-token-btn" id="copyTokenBtn">
                            <i class="fas fa-copy"></i> Copy
                        </button>
                    </div>
                    <div class="copied-msg" id="copiedMsg">
                        <i class="fas fa-check"></i> Token copied! Paste it in the app to login.
                    </div>
                    <button class="open-app-btn" id="openAppBtn">
                        <i class="fas fa-external-link-alt"></i> Open Bari Plux Tool
                    </button>
                </div>
                
                <button id="btnLogout" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <a href="index.html">Terms</a>
        <a href="index.html">Privacy</a>
        <a href="index.html">Support</a>
    </footer>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBH_t3Uue7fbb-DahwjSJGjG2-quCqiLEs",
            authDomain: "baripluxwebsite.firebaseapp.com",
            projectId: "baripluxwebsite",
            storageBucket: "baripluxwebsite.firebasestorage.app",
            messagingSenderId: "280043766563",
            appId: "1:280043766563:web:409e6b78c1c24b568fc296"
        };

        let auth = null;
        let database = null;
        let firebaseInitialized = false;

        function initFirebase() {
            try {
                firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                try {
                    database = firebase.database();
                } catch(e) {
                    console.log("Firebase Database not available");
                }
                firebaseInitialized = true;
                console.log("Firebase initialized successfully");
                return true;
            } catch (error) {
                console.error("Firebase initialization error:", error);
                return false;
            }
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                <span>${message}</span>
            `;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        function generateToken(user) {
            const tokenData = {
                id: user.id,
                name: user.name,
                email: user.email,
                method: user.loginMethod,
                time: Date.now()
            };
            return btoa(JSON.stringify(tokenData));
        }

        function syncLoginToFirebase(user) {
            if (!firebaseInitialized || !database) return;
            try {
                const userRef = database.ref('users/' + user.id);
                userRef.set({
                    name: user.name,
                    email: user.email,
                    loginMethod: user.loginMethod,
                    loginTime: user.loginTime || new Date().toISOString(),
                    lastActive: firebase.database.ServerValue.TIMESTAMP,
                    platform: 'website'
                }).then(() => {
                    console.log('Login synced to Firebase');
                }).catch(err => {
                    console.error('Error syncing:', err);
                });
            } catch (error) {
                console.error("Sync error:", error);
            }
        }

        function showLoggedInView(user) {
            document.getElementById('loginFormView').style.display = 'none';
            document.getElementById('loggedInView').style.display = 'block';
            
            const initial = (user.name || 'U').charAt(0).toUpperCase();
            const userAvatar = document.getElementById('userAvatar');
            
            if (user.photoURL) {
                userAvatar.innerHTML = `<img src="${user.photoURL}" alt="Profile">`;
            } else {
                userAvatar.textContent = initial;
            }
            
            document.getElementById('userName').textContent = user.name || 'User';
            document.getElementById('userEmail').textContent = user.email || '';
            document.getElementById('userId').textContent = user.id || '---';
            
            // Generate and display token
            const token = generateToken(user);
            document.getElementById('loginToken').value = token;
            
            localStorage.setItem('bariplux_user', JSON.stringify(user));
            localStorage.setItem('bariplux_user_new', JSON.stringify(user));
            localStorage.setItem('bariplux_login_token', token);
        }

        function showLoginFormView() {
            document.getElementById('loginFormView').style.display = 'block';
            document.getElementById('loggedInView').style.display = 'none';
            document.getElementById('btnGoogleLogin').disabled = false;
            document.getElementById('btnGoogleLogin').classList.remove('loading');
            document.getElementById('loginToken').value = '';
        }

        // Google Login
        document.getElementById('btnGoogleLogin').addEventListener('click', async function() {
            const btn = this;
            btn.disabled = true;
            btn.classList.add('loading');

            if (firebaseInitialized && auth) {
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    provider.setCustomParameters({
                        prompt: 'select_account',
                        hd: '' 
                    });
                    
                    const result = await auth.signInWithPopup(provider);
                    const user = result.user;
                    
                    const userData = {
                        id: user.uid,
                        name: user.displayName || user.email.split('@')[0],
                        email: user.email,
                        photoURL: user.photoURL || null,
                        loginMethod: 'google',
                        loginTime: new Date().toISOString()
                    };

                    showLoggedInView(userData);
                    syncLoginToFirebase(userData);
                    showNotification('Welcome, ' + userData.name + '!', 'success');
                } catch (error) {
                    btn.disabled = false;
                    btn.classList.remove('loading');
                    
                    if (error.code === 'auth/unauthorized-domain') {
                        showNotification('Domain not authorized. Add your domain in Firebase Console.', 'error');
                    } else if (error.code !== 'auth/popup-closed-by-user') {
                        showNotification('Login failed: ' + error.message, 'error');
                    }
                }
            } else {
                showNotification('Firebase not configured', 'error');
                btn.disabled = false;
                btn.classList.remove('loading');
            }
        });

        // Copy Token
        document.getElementById('copyTokenBtn').addEventListener('click', function() {
            const tokenInput = document.getElementById('loginToken');
            tokenInput.select();
            tokenInput.setSelectionRange(0, 99999);
            
            navigator.clipboard.writeText(tokenInput.value).then(() => {
                document.getElementById('copiedMsg').classList.add('show');
                setTimeout(() => {
                    document.getElementById('copiedMsg').classList.remove('show');
                }, 3000);
            });
        });

        // Open App
        document.getElementById('openAppBtn').addEventListener('click', function() {
            const token = document.getElementById('loginToken').value;
            if (!token) {
                showNotification('No token available', 'error');
                return;
            }
            
            // Copy token to clipboard
            navigator.clipboard.writeText(token).then(() => {
                // Try app URL schemes
                const appUrls = [
                    'baripluxtool://login?token=' + token,
                    'bptv2://login?token=' + token
                ];
                
                let tried = 0;
                function tryNextUrl() {
                    if (tried >= appUrls.length) {
                        showNotification('Token copied! Open the app manually.', 'success');
                        return;
                    }
                    window.location.href = appUrls[tried];
                    tried++;
                    setTimeout(tryNextUrl, 1000);
                }
                tryNextUrl();
            }).catch(() => {
                showNotification('Failed to copy token', 'error');
            });
        });

        // Logout
        document.getElementById('btnLogout').addEventListener('click', async function() {
            if (firebaseInitialized && auth) {
                try {
                    await auth.signOut();
                } catch (error) {
                    console.error('Logout error:', error);
                }
            }
            localStorage.removeItem('bariplux_user');
            localStorage.removeItem('bariplux_user_new');
            localStorage.removeItem('bariplux_login_token');
            showLoginFormView();
            showNotification('Logged out successfully', 'success');
        });

        // Check if already logged in
        function checkLoginStatus() {
            const storedUser = localStorage.getItem('bariplux_user');
            
            // Also check Firebase auth state
            if (firebaseInitialized && auth) {
                auth.onAuthStateChanged((user) => {
                    if (user) {
                        const firebaseUser = {
                            id: user.uid,
                            name: user.displayName || user.email.split('@')[0],
                            email: user.email,
                            photoURL: user.photoURL || null,
                            loginMethod: 'google',
                            loginTime: new Date().toISOString()
                        };
                        localStorage.setItem('bariplux_user', JSON.stringify(firebaseUser));
                        showLoggedInView(firebaseUser);
                    } else if (!storedUser) {
                        showLoginFormView();
                    }
                });
            } else if (storedUser) {
                try {
                    const user = JSON.parse(storedUser);
                    showLoggedInView(user);
                } catch (e) {}
            }
        }

        // Initialize Particles
        function initParticles() {
            if (typeof particlesJS !== 'undefined') {
                particlesJS('particles-js', {
                    "particles": {
                        "number": { "value": 40, "density": { "enable": true, "value_area": 800 } },
                        "color": { "value": "#6C63FF" },
                        "shape": { "type": "circle" },
                        "opacity": { "value": 0.3, "random": false },
                        "size": { "value": 2, "random": true },
                        "line_linked": {
                            "enable": true,
                            "distance": 150,
                            "color": "#6C63FF",
                            "opacity": 0.2,
                            "width": 1
                        },
                        "move": {
                            "enable": true,
                            "speed": 3,
                            "direction": "none",
                            "random": false,
                            "straight": false,
                            "out_mode": "out"
                        }
                    },
                    "interactivity": {
                        "detect_on": "canvas",
                        "events": {
                            "onhover": { "enable": true, "mode": "grab" },
                            "onclick": { "enable": true, "mode": "push" }
                        }
                    },
                    "retina_detect": true
                });
            }
        }

        // Scroll Progress
        const scrollProgress = document.getElementById('scrollProgress');
        window.addEventListener('scroll', () => {
            if (scrollProgress) {
                const scrollTop = window.scrollY;
                const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                const scrollPercent = (scrollTop / docHeight) * 100;
                scrollProgress.style.width = scrollPercent + '%';
            }
        }, { passive: true });

        // Theme Toggle
        const themeToggle = document.getElementById('theme-toggle');
        if (themeToggle) {
            const storedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
            document.documentElement.setAttribute('data-theme', storedTheme);
            
            themeToggle.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initFirebase();
            checkLoginStatus();
            initParticles();
        });
    </script>
</body>
</html>
